name: My Build & Test Workflow

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore workloads
      run: dotnet workload restore ./StarterApp/StarterApp.csproj

    - name: Restore dependencies
      run: dotnet restore ./StarterApp.sln

    - name: Install Tools
      run: dotnet tool install --global dotnet-coverage

    # Setup a Java JDK (needed for SonarCloud)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'

    # Cache SonarCloud packages
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    # Cache SonarCloud scanner
    - name: Cache SonarCloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@v4
      with:
        path: ./.sonar/scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner

    # Install SonarCloud scanner if not cached
    - name: Install SonarCloud scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      run: |
        mkdir -p .sonar/scanner
        dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner
        echo "$PWD/.sonar/scanner" >> $GITHUB_PATH

    # Start SonarCloud analysis
    - name: Start Sonar Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        ./.sonar/scanner/dotnet-sonarscanner begin \
        /k:"ml40683364_rental-marketplace-ptp" \
        /o:"ml40683364" \
        /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
        /d:sonar.host.url="https://sonarcloud.io" \
        /d:sonar.scanner.scanAll=false \
        /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

    # Build project
    - name: Build project
      env:
        ConnectionStrings__TestConnection: Host=postgres;Port=5432;Database=testdb;Username=test_user;Password=test_password
      run: dotnet build ./StarterApp.sln --framework net10.0

    # Run tests and collect coverage
    - name: Test
      env:
        ConnectionStrings__TestConnection: Host=postgres;Port=5432;Database=testdb;Username=test_user;Password=test_password
      run: dotnet-coverage collect "dotnet test ./StarterApp.sln --framework net10.0" -f xml -o "coverage.xml"

    # End SonarCloud analysis
    - name: End Sonar Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"